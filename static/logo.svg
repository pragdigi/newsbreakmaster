<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56" role="img" aria-label="NewsBreakMaster">
  <defs>
    <linearGradient id="nb-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b2f"/>
      <stop offset="55%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="nb-bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
