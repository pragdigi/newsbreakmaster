<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NewsBreak Ads Launcher{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="nb-header">
    <a class="nb-brand" href="{{ url_for('dashboard') }}">NewsBreak Launcher</a>
    <nav class="nb-nav">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('launch') }}">Bulk launch</a>
      <a href="{{ url_for('scaling') }}">Scaling</a>
      <a href="{{ url_for('rules_page') }}">Rules</a>
      <a href="{{ url_for('logout') }}">Log out</a>
    </nav>
  </header>
  <main class="nb-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
