<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ active_platform_label }} Launcher{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="nb-header">
    <a class="nb-brand" href="{{ url_for('dashboard') }}">
      <img src="{{ url_for('static', filename='logo.svg') }}" alt="{{ active_platform_label }} Launcher" height="40">
    </a>
    <nav class="nb-nav">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('launch') }}">Bulk launch</a>
      <a href="{{ url_for('scaling') }}">Scaling</a>
      <a href="{{ url_for('rules_page') }}">Rules</a>
      <a href="{{ url_for('settings_page') }}">Offers</a>
      <span class="nb-platform-switcher" title="Active ad platform">
        {% for p in available_platforms %}
          {% if p.id == active_platform %}
            <span class="nb-platform-active">{{ p.label }}</span>
          {% else %}
            <form method="post" action="{{ url_for('platform_switch') }}" style="display:inline;">
              <input type="hidden" name="platform" value="{{ p.id }}">
              <input type="hidden" name="next" value="{{ request.path }}">
              <button type="submit" class="nb-platform-link">Switch to {{ p.label }}</button>
            </form>
          {% endif %}
        {% endfor %}
      </span>
      <a href="{{ url_for('logout') }}">Log out</a>
    </nav>
  </header>
  <main class="nb-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
